<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chore Chart ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2f5a; --gold: #f5c842; --gold-dark: #d4a800;
    --coral: #ff6b6b; --mint: #4ecdc4; --green: #22c55e;
    --card-bg: #ffffff; --page-bg: #eef7ff; --text: #1a2f5a; --muted: #7a8fa8;
    --radius: 20px; --shadow: 0 4px 20px rgba(26,47,90,0.10); --shadow-lg: 0 8px 32px rgba(26,47,90,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  nav { position: sticky; top: 0; z-index: 100; background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 58px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .nav-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--gold); }
  .nav-tabs { display: flex; gap: 5px; }
  .nav-tab { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; padding: 6px 11px; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
  .nav-tab.active, .nav-tab:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }

  .page { display: none; padding: 18px 13px 90px; max-width: 800px; margin: 0 auto; }
  .page.active { display: block; }

  .date-banner { text-align: center; margin-bottom: 16px; }
  .date-banner .day-label { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--navy); }
  .date-banner .date-sub { font-size: 0.83rem; color: var(--muted); font-weight: 600; }

  .kid-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
  .kid-header { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--page-bg); }
  .kid-name-row { display: flex; align-items: center; gap: 10px; }
  .kid-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 900; flex-shrink: 0; }
  .kid-name { font-family: 'Fredoka One', cursive; font-size: 1.15rem; }
  .kid-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .kid-progress-pill { background: var(--page-bg); border-radius: 30px; padding: 3px 11px; font-size: 0.76rem; font-weight: 800; color: var(--muted); }
  .kid-progress-pill.done { background: #dcfce7; color: #16a34a; }
  .kid-wallet-mini { font-size: 0.76rem; font-weight: 800; color: var(--gold-dark); background: #fffbeb; border-radius: 20px; padding: 3px 9px; }

  .chore-list { padding: 3px 0; }
  .chore-item { display: flex; align-items: center; gap: 11px; padding: 11px 16px; border-bottom: 1px solid #f0f5fa; cursor: pointer; transition: background 0.15s; user-select: none; -webkit-user-select: none; }
  .chore-item:last-child { border-bottom: none; }
  .chore-item:active { background: #f0f5fa; }
  .chore-checkbox { width: 25px; height: 25px; border-radius: 7px; border: 2.5px solid #d0dce8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .chore-item.checked .chore-checkbox { border-color: var(--green); background: var(--green); animation: pop 0.25s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .chore-item.checked .chore-checkbox::after { content: '✓'; color: white; font-weight: 900; font-size: 0.85rem; }
  .chore-label { font-size: 0.93rem; font-weight: 700; flex: 1; transition: all 0.2s; }
  .chore-item.checked .chore-label { text-decoration: line-through; color: var(--muted); }
  .chore-emoji { font-size: 1.05rem; }
  .kid-progress-bar-wrap { padding: 0 16px 11px; }
  .kid-progress-bar-bg { height: 6px; background: var(--page-bg); border-radius: 10px; overflow: hidden; }
  .kid-progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }

  /* WALLET */
  .wallet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .wallet-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .wallet-card-header { padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px; }
  .wallet-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 900; flex-shrink: 0; }
  .wallet-kid-name { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--navy); }
  .wallet-balance { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1; }
  .wallet-balance-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); margin-top: 2px; }
  .wallet-actions { display: flex; gap: 7px; padding: 0 14px 14px; }
  .wallet-btn { flex: 1; border: none; border-radius: 11px; padding: 8px 0; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.83rem; cursor: pointer; transition: all 0.2s; }
  .wallet-btn.earn { background: #dcfce7; color: #16a34a; }
  .wallet-btn.earn:hover { background: #bbf7d0; }
  .wallet-btn.spend { background: #fee2e2; color: #dc2626; }
  .wallet-btn.spend:hover { background: #fecaca; }
  .wallet-history { border-top: 2px solid var(--page-bg); max-height: 155px; overflow-y: auto; }
  .wallet-tx { display: flex; align-items: center; padding: 8px 14px; border-bottom: 1px solid #f0f5fa; font-size: 0.78rem; }
  .wallet-tx:last-child { border-bottom: none; }
  .wallet-tx-label { font-weight: 700; color: var(--text); flex: 1; }
  .wallet-tx-date { color: var(--muted); font-weight: 600; font-size: 0.7rem; margin: 0 7px; }
  .wallet-tx-amount { font-weight: 900; }
  .wallet-tx-amount.pos { color: #16a34a; }
  .wallet-tx-amount.neg { color: #dc2626; }
  .wallet-tx-empty { padding: 13px 14px; color: var(--muted); font-size: 0.8rem; font-weight: 600; text-align: center; }

  /* WEEKLY */
  .week-recap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 13px; margin-bottom: 24px; }
  .recap-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; text-align: center; }
  .recap-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; margin: 0 auto 9px; }
  .recap-kid-name { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--navy); margin-bottom: 3px; }
  .recap-score { font-size: 1.8rem; font-weight: 900; color: var(--navy); line-height: 1; }
  .recap-score span { font-size: 0.88rem; color: var(--muted); font-weight: 700; }
  .recap-pct { font-size: 0.8rem; font-weight: 700; margin-top: 3px; }
  .recap-streak { margin-top: 5px; font-size: 0.76rem; font-weight: 700; color: var(--muted); }
  .recap-bonus { margin-top: 7px; font-size: 0.8rem; font-weight: 800; }
  .recap-days { display: flex; justify-content: center; gap: 4px; margin-top: 9px; }
  .recap-day-dot { width: 19px; height: 19px; border-radius: 50%; background: var(--page-bg); display: flex; align-items: center; justify-content: center; font-size: 0.53rem; font-weight: 800; color: var(--muted); }
  .recap-day-dot.perfect { background: var(--green); color: white; }
  .recap-day-dot.partial { background: var(--gold); color: var(--navy); }

  /* MANAGE */
  .section-title { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--navy); margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }
  .manage-section { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 20px; }
  .manage-section h3 { font-family: 'Fredoka One', cursive; font-size: 1rem; margin-bottom: 11px; color: var(--navy); }
  .kid-manage-row, .chore-manage-row { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid #f0f5fa; }
  .kid-manage-row:last-of-type, .chore-manage-row:last-of-type { border-bottom: none; }
  .kid-color-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .kid-manage-name, .chore-manage-name { font-weight: 700; flex: 1; font-size: 0.9rem; }
  .chore-manage-row { font-size: 0.87rem; font-weight: 600; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 0.97rem; padding: 3px 5px; border-radius: 7px; transition: background 0.15s; }
  .btn-icon:hover { background: var(--page-bg); }
  .btn-icon.danger:hover { background: #fee2e2; }
  .add-row { display: flex; gap: 7px; margin-top: 11px; }
  input[type="text"] { flex: 1; border: 2px solid #d0dce8; border-radius: 11px; padding: 8px 11px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--mint); }
  select { border: 2px solid #d0dce8; border-radius: 11px; padding: 8px 11px; font-family: 'Nunito', sans-serif; font-size: 0.86rem; font-weight: 700; outline: none; background: white; color: var(--text); cursor: pointer; }
  .btn { background: var(--navy); color: white; border: none; border-radius: 11px; padding: 8px 15px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.86rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { background: var(--mint); }
  .btn.danger { background: var(--coral); }
  .btn.danger:hover { background: #e05555; }
  .btn.gold { background: var(--gold); color: var(--navy); }
  .btn.gold:hover { background: var(--gold-dark); }
  .empty-state { text-align: center; padding: 26px; color: var(--muted); font-size: 0.9rem; font-weight: 600; }
  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 7px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(26,47,90,0.6); display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 22px; padding: 26px 22px; max-width: 310px; width: 90%; box-shadow: var(--shadow-lg); animation: bounceIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounceIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-title { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--navy); margin-bottom: 4px; }
  .modal-sub { font-size: 0.83rem; color: var(--muted); font-weight: 600; margin-bottom: 16px; }
  .modal-input-row { display: flex; gap: 7px; margin-bottom: 13px; }
  .modal-actions { display: flex; gap: 7px; }

  /* CELEBRATION */
  #celebration-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(26,47,90,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(6px); }
  #celebration-overlay.show { display: flex; }
  .celebration-card { background: white; border-radius: 26px; padding: 34px 28px; text-align: center; max-width: 295px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .celebration-stars { font-size: 2.6rem; margin-bottom: 5px; }
  .celebration-heading { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--navy); margin-bottom: 4px; }
  .celebration-name { font-size: 0.97rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
  .celebration-bonus { font-size: 0.97rem; font-weight: 800; color: #16a34a; background: #dcfce7; border-radius: 11px; padding: 7px 14px; margin: 9px 0 14px; display: none; }
  .celebration-dismiss { background: var(--gold); color: var(--navy); border: none; border-radius: 13px; padding: 10px 24px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.93rem; cursor: pointer; }
  .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; opacity: 0; animation: confettiFall linear forwards; z-index: 1000; pointer-events: none; }
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
  .reset-notice { background: #fff9e6; border: 2px solid var(--gold); border-radius: 13px; padding: 9px 13px; font-size: 0.8rem; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 13px; display: none; }

  @media (max-width: 480px) {
    .week-recap-grid, .wallet-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-title">⭐ Chore Chart</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('today',this)">Today</button>
    <button class="nav-tab" onclick="showPage('wallet',this)">💰 Wallet</button>
    <button class="nav-tab" onclick="showPage('weekly', this)">Weekly</button>
  </div>
</nav>
