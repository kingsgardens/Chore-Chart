<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chore Chart ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2f5a; --gold: #f5c842; --gold-dark: #d4a800;
    --coral: #ff6b6b; --mint: #4ecdc4; --green: #22c55e;
    --card-bg: #ffffff; --page-bg: #eef7ff; --text: #1a2f5a; --muted: #7a8fa8;
    --radius: 20px; --shadow: 0 4px 20px rgba(26,47,90,0.10); --shadow-lg: 0 8px 32px rgba(26,47,90,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  nav { position: sticky; top: 0; z-index: 100; background: var(--navy); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 58px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .nav-title { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--gold); }
  .nav-tabs { display: flex; gap: 5px; }
  .nav-tab { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; padding: 6px 11px; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
  .nav-tab.active, .nav-tab:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }

  .page { display: none; padding: 18px 13px 90px; max-width: 800px; margin: 0 auto; }
  .page.active { display: block; }

  .date-banner { text-align: center; margin-bottom: 16px; }
  .date-banner .day-label { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--navy); }
  .date-banner .date-sub { font-size: 0.83rem; color: var(--muted); font-weight: 600; }

  .kid-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
  .kid-header { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--page-bg); }
  .kid-name-row { display: flex; align-items: center; gap: 10px; }
  .kid-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 900; flex-shrink: 0; }
  .kid-name { font-family: 'Fredoka One', cursive; font-size: 1.15rem; }
  .kid-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .kid-progress-pill { background: var(--page-bg); border-radius: 30px; padding: 3px 11px; font-size: 0.76rem; font-weight: 800; color: var(--muted); }
  .kid-progress-pill.done { background: #dcfce7; color: #16a34a; }
  .kid-wallet-mini { font-size: 0.76rem; font-weight: 800; color: var(--gold-dark); background: #fffbeb; border-radius: 20px; padding: 3px 9px; }

  .chore-list { padding: 3px 0; }
  .chore-item { display: flex; align-items: center; gap: 11px; padding: 11px 16px; border-bottom: 1px solid #f0f5fa; cursor: pointer; transition: background 0.15s; user-select: none; -webkit-user-select: none; }
  .chore-item:last-child { border-bottom: none; }
  .chore-item:active { background: #f0f5fa; }
  .chore-checkbox { width: 25px; height: 25px; border-radius: 7px; border: 2.5px solid #d0dce8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .chore-item.checked .chore-checkbox { border-color: var(--green); background: var(--green); animation: pop 0.25s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .chore-item.checked .chore-checkbox::after { content: '✓'; color: white; font-weight: 900; font-size: 0.85rem; }
  .chore-label { font-size: 0.93rem; font-weight: 700; flex: 1; transition: all 0.2s; }
  .chore-item.checked .chore-label { text-decoration: line-through; color: var(--muted); }
  .chore-emoji { font-size: 1.05rem; }
  .kid-progress-bar-wrap { padding: 0 16px 11px; }
  .kid-progress-bar-bg { height: 6px; background: var(--page-bg); border-radius: 10px; overflow: hidden; }
  .kid-progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }

  /* WALLET */
  .wallet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .wallet-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .wallet-card-header { padding: 16px 16px 12px; display: flex; align-items: center; gap: 12px; }
  .wallet-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 900; flex-shrink: 0; }
  .wallet-kid-name { font-family: 'Fredoka One', cursive; font-size: 1.05rem; color: var(--navy); }
  .wallet-balance { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1; }
  .wallet-balance-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); margin-top: 2px; }
  .wallet-actions { display: flex; gap: 7px; padding: 0 14px 14px; }
  .wallet-btn { flex: 1; border: none; border-radius: 11px; padding: 8px 0; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.83rem; cursor: pointer; transition: all 0.2s; }
  .wallet-btn.earn { background: #dcfce7; color: #16a34a; }
  .wallet-btn.earn:hover { background: #bbf7d0; }
  .wallet-btn.spend { background: #fee2e2; color: #dc2626; }
  .wallet-btn.spend:hover { background: #fecaca; }
  .wallet-history { border-top: 2px solid var(--page-bg); max-height: 155px; overflow-y: auto; }
  .wallet-tx { display: flex; align-items: center; padding: 8px 14px; border-bottom: 1px solid #f0f5fa; font-size: 0.78rem; }
  .wallet-tx:last-child { border-bottom: none; }
  .wallet-tx-label { font-weight: 700; color: var(--text); flex: 1; }
  .wallet-tx-date { color: var(--muted); font-weight: 600; font-size: 0.7rem; margin: 0 7px; }
  .wallet-tx-amount { font-weight: 900; }
  .wallet-tx-amount.pos { color: #16a34a; }
  .wallet-tx-amount.neg { color: #dc2626; }
  .wallet-tx-empty { padding: 13px 14px; color: var(--muted); font-size: 0.8rem; font-weight: 600; text-align: center; }

  /* WEEKLY */
  .week-recap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 13px; margin-bottom: 24px; }
  .recap-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; text-align: center; }
  .recap-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; margin: 0 auto 9px; }
  .recap-kid-name { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--navy); margin-bottom: 3px; }
  .recap-score { font-size: 1.8rem; font-weight: 900; color: var(--navy); line-height: 1; }
  .recap-score span { font-size: 0.88rem; color: var(--muted); font-weight: 700; }
  .recap-pct { font-size: 0.8rem; font-weight: 700; margin-top: 3px; }
  .recap-streak { margin-top: 5px; font-size: 0.76rem; font-weight: 700; color: var(--muted); }
  .recap-bonus { margin-top: 7px; font-size: 0.8rem; font-weight: 800; }
  .recap-days { display: flex; justify-content: center; gap: 4px; margin-top: 9px; }
  .recap-day-dot { width: 19px; height: 19px; border-radius: 50%; background: var(--page-bg); display: flex; align-items: center; justify-content: center; font-size: 0.53rem; font-weight: 800; color: var(--muted); }
  .recap-day-dot.perfect { background: var(--green); color: white; }
  .recap-day-dot.partial { background: var(--gold); color: var(--navy); }

  /* MANAGE */
  .section-title { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--navy); margin-bottom: 13px; display: flex; align-items: center; gap: 7px; }
  .manage-section { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 20px; }
  .manage-section h3 { font-family: 'Fredoka One', cursive; font-size: 1rem; margin-bottom: 11px; color: var(--navy); }
  .kid-manage-row, .chore-manage-row { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid #f0f5fa; }
  .kid-manage-row:last-of-type, .chore-manage-row:last-of-type { border-bottom: none; }
  .kid-color-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
  .kid-manage-name, .chore-manage-name { font-weight: 700; flex: 1; font-size: 0.9rem; }
  .chore-manage-row { font-size: 0.87rem; font-weight: 600; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 0.97rem; padding: 3px 5px; border-radius: 7px; transition: background 0.15s; }
  .btn-icon:hover { background: var(--page-bg); }
  .btn-icon.danger:hover { background: #fee2e2; }
  .add-row { display: flex; gap: 7px; margin-top: 11px; }
  input[type="text"] { flex: 1; border: 2px solid #d0dce8; border-radius: 11px; padding: 8px 11px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--mint); }
  select { border: 2px solid #d0dce8; border-radius: 11px; padding: 8px 11px; font-family: 'Nunito', sans-serif; font-size: 0.86rem; font-weight: 700; outline: none; background: white; color: var(--text); cursor: pointer; }
  .btn { background: var(--navy); color: white; border: none; border-radius: 11px; padding: 8px 15px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.86rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { background: var(--mint); }
  .btn.danger { background: var(--coral); }
  .btn.danger:hover { background: #e05555; }
  .btn.gold { background: var(--gold); color: var(--navy); }
  .btn.gold:hover { background: var(--gold-dark); }
  .empty-state { text-align: center; padding: 26px; color: var(--muted); font-size: 0.9rem; font-weight: 600; }
  .empty-state .emoji { font-size: 2rem; display: block; margin-bottom: 7px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(26,47,90,0.6); display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 22px; padding: 26px 22px; max-width: 310px; width: 90%; box-shadow: var(--shadow-lg); animation: bounceIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes bounceIn { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-title { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--navy); margin-bottom: 4px; }
  .modal-sub { font-size: 0.83rem; color: var(--muted); font-weight: 600; margin-bottom: 16px; }
  .modal-input-row { display: flex; gap: 7px; margin-bottom: 13px; }
  .modal-actions { display: flex; gap: 7px; }

  /* CELEBRATION */
  #celebration-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(26,47,90,0.7); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(6px); }
  #celebration-overlay.show { display: flex; }
  .celebration-card { background: white; border-radius: 26px; padding: 34px 28px; text-align: center; max-width: 295px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .celebration-stars { font-size: 2.6rem; margin-bottom: 5px; }
  .celebration-heading { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--navy); margin-bottom: 4px; }
  .celebration-name { font-size: 0.97rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
  .celebration-bonus { font-size: 0.97rem; font-weight: 800; color: #16a34a; background: #dcfce7; border-radius: 11px; padding: 7px 14px; margin: 9px 0 14px; display: none; }
  .celebration-dismiss { background: var(--gold); color: var(--navy); border: none; border-radius: 13px; padding: 10px 24px; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.93rem; cursor: pointer; }
  .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; opacity: 0; animation: confettiFall linear forwards; z-index: 1000; pointer-events: none; }
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
  .reset-notice { background: #fff9e6; border: 2px solid var(--gold); border-radius: 13px; padding: 9px 13px; font-size: 0.8rem; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 13px; display: none; }

  @media (max-width: 480px) {
    .week-recap-grid, .wallet-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-title">⭐ Chore Chart</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('today',this)">Today</button>
    <button class="nav-tab" onclick="showPage('wallet',this)">💰 Wallet</button>
    <button class="nav-tab" onclick="showPage('weekly',this)">Weekly</button>
  </div>
</nav>

<!-- TODAY -->
<div id="page-today" class="page active">
  <div class="date-banner">
    <div class="day-label" id="day-label"></div>
    <div class="date-sub" id="date-sub"></div>
  </div>
  <div id="reset-notice" class="reset-notice">🌅 New day! Chores have been reset.</div>
  <div id="kids-container"></div>
  <div id="today-empty" class="empty-state" style="display:none"><span class="emoji">🌱</span>No kids or chores yet!<br>Go to <strong>Weekly</strong> to get started.</div>
</div>

<!-- WALLET -->
<div id="page-wallet" class="page">
  <div class="section-title">💰 Wallets</div>
  <div id="wallet-grid" class="wallet-grid"></div>
  <div id="wallet-empty" class="empty-state" style="display:none"><span class="emoji">👛</span>No kids yet — add them in the Weekly tab.</div>
</div>

<!-- WEEKLY -->
<div id="page-weekly" class="page">
  <div class="section-title">📊 This Week's Recap</div>
  <div id="recap-container" class="week-recap-grid"></div>
  <hr style="border:none;border-top:2px solid #d0dce8;margin:2px 0 22px">

  <div class="section-title">👦 Kids</div>
  <div class="manage-section">
    <div id="kids-manage-list"></div>
    <div class="add-row">
      <input type="text" id="new-kid-name" placeholder="Kid's name…" maxlength="20">
      <button class="btn" onclick="addKid()">+ Add</button>
    </div>
  </div>

  <div class="section-title">✅ Chores</div>
  <div class="manage-section">
    <div id="chores-manage-list"></div>
    <div class="add-row">
      <input type="text" id="new-chore-name" placeholder="Chore name…" maxlength="40">
      <input type="text" id="new-chore-emoji" placeholder="🧹" maxlength="2" style="width:54px;flex:none;text-align:center">
      <button class="btn" onclick="addChore()">+ Add</button>
    </div>
    <div style="margin-top:13px">
      <div style="font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:7px">Assign / Remove chores per kid:</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center">
        <select id="assign-chore-select-chore"></select>
        <select id="assign-chore-select-kid"></select>
        <button class="btn gold" onclick="assignChore()">Assign</button>
        <button class="btn" style="background:#e0eaf5;color:var(--navy)" onclick="unassignChore()">Remove</button>
      </div>
    </div>
  </div>

  <div class="manage-section">
    <h3>⚙️ Options</h3>
    <button class="btn danger" onclick="clearAllData()">🗑 Reset All Data</button>
  </div>
</div>

<!-- TX MODAL -->
<div class="modal-overlay" id="tx-modal">
  <div class="modal-box">
    <div class="modal-title" id="tx-modal-title">Add Transaction</div>
    <div class="modal-sub" id="tx-modal-sub"></div>
    <div class="modal-input-row">
      <input type="text" id="tx-amount" placeholder="Amount (e.g. 2.50)" style="width:115px;flex:none" inputmode="decimal">
      <input type="text" id="tx-note" placeholder="Note (e.g. Ice cream)">
    </div>
    <div class="modal-actions">
      <button class="btn" style="background:#e0eaf5;color:var(--navy);flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn" id="tx-confirm-btn" style="flex:1" onclick="confirmTransaction()">Confirm</button>
    </div>
  </div>
</div>

<!-- CELEBRATION -->
<div id="celebration-overlay">
  <div class="celebration-card">
    <div class="celebration-stars">🌟⭐🌟</div>
    <div class="celebration-heading">Amazing!</div>
    <div class="celebration-name" id="celebration-name"></div>
    <div class="celebration-bonus" id="celebration-bonus"></div>
    <div style="font-size:1.7rem;margin:5px 0">🎉🎊🥳</div>
    <button class="celebration-dismiss" onclick="dismissCelebration()">Woohoo! 🎉</button>
  </div>
</div>

<script>
const KID_COLORS = [
  {bg:'#fde68a',text:'#92400e',dot:'#f59e0b'},
  {bg:'#bfdbfe',text:'#1e40af',dot:'#3b82f6'},
  {bg:'#d9f99d',text:'#365314',dot:'#84cc16'},
  {bg:'#fecdd3',text:'#9f1239',dot:'#f43f5e'},
  {bg:'#c7d2fe',text:'#3730a3',dot:'#6366f1'},
  {bg:'#a7f3d0',text:'#065f46',dot:'#10b981'},
];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKLY_BONUS=5.00;

let S={kids:[],chores:[],assignments:{},checks:{},lastDate:null,shownCelebration:{},wallets:{}};

function save(){localStorage.setItem('chore-v2',JSON.stringify(S));}
function load(){
  try{
    const r=localStorage.getItem('chore-v2');
    if(r) S=JSON.parse(r);
    ['kids','chores'].forEach(k=>{if(!S[k])S[k]=[];});
    ['assignments','checks','shownCelebration','wallets'].forEach(k=>{if(!S[k])S[k]={};});
  }catch(e){}
}

function todayStr(){const d=new Date();return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function p(n){return String(n).padStart(2,'0');}
function weekDates(){
  const t=new Date(),day=t.getDay(),dates=[];
  for(let i=0;i<7;i++){const d=new Date(t);d.setDate(t.getDate()-day+i);dates.push(`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`);}
  return dates;
}
function fmtDate(s){const d=new Date(s+'T12:00:00');return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;}

function showPage(id,tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(tab)tab.classList.add('active');
  if(id==='weekly')renderWeekly();
  if(id==='wallet')renderWallets();
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function renderToday(){
  const today=todayStr(),d=new Date();
  document.getElementById('day-label').textContent=FULL_DAYS[d.getDay()];
  document.getElementById('date-sub').textContent=`${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  const notice=document.getElementById('reset-notice');
  if(S.lastDate&&S.lastDate!==today){notice.style.display='block';setTimeout(()=>notice.style.display='none',4000);}
  S.lastDate=today;save();
  const container=document.getElementById('kids-container');
  const empty=document.getElementById('today-empty');
  container.innerHTML='';
  if(!S.kids.length){empty.style.display='block';return;}
  empty.style.display='none';
  if(!S.checks[today])S.checks[today]={};

  S.kids.forEach(kid=>{
    const choreIds=S.assignments[kid.id]||[];
    const checked=S.checks[today][kid.id]||{};
    const done=choreIds.filter(c=>checked[c]).length;
    const total=choreIds.length;
    const allDone=total>0&&done===total;
    const col=KID_COLORS[kid.colorIdx%KID_COLORS.length];
    const pct=total>0?Math.round((done/total)*100):0;
    ensureWallet(kid.id);
    const bal=S.wallets[kid.id].balance;

    const card=document.createElement('div');
    card.className='kid-card';
    card.innerHTML=`
      <div class="kid-header">
        <div class="kid-name-row">
          <div class="kid-avatar" style="background:${col.bg};color:${col.text}">${kid.name[0].toUpperCase()}</div>
          <div class="kid-name" style="color:${col.dot}">${kid.name}</div>
        </div>
        <div class="kid-header-right">
          <div class="kid-progress-pill ${allDone?'done':''}">${done}/${total}${allDone?' ✓ Done!':''}</div>
          <div class="kid-wallet-mini">💰 $${bal.toFixed(2)}</div>
        </div>
      </div>
      <div class="chore-list" id="cl-${kid.id}"></div>
      <div class="kid-progress-bar-wrap">
        <div class="kid-progress-bar-bg">
          <div class="kid-progress-bar-fill" style="width:${pct}%;background:${allDone?'var(--green)':col.dot}"></div>
        </div>
      </div>`;
    container.appendChild(card);

    const list=document.getElementById('cl-'+kid.id);
    if(!choreIds.length){
      list.innerHTML=`<div style="padding:13px 16px;color:var(--muted);font-size:0.86rem;font-weight:600">No chores assigned yet.</div>`;
    } else {
      choreIds.forEach(cid=>{
        const chore=S.chores.find(c=>c.id===cid);if(!chore)return;
        const isChk=!!checked[cid];
        const item=document.createElement('div');
        item.className='chore-item'+(isChk?' checked':'');
        item.innerHTML=`<div class="chore-checkbox"></div><span class="chore-emoji">${chore.emoji||'✅'}</span><span class="chore-label">${chore.name}</span>`;
        item.addEventListener('click',()=>toggleChore(kid.id,cid,today));
        list.appendChild(item);
      });
    }
  });
}

function toggleChore(kidId,choreId,dateStr){
  if(!S.checks[dateStr])S.checks[dateStr]={};
  if(!S.checks[dateStr][kidId])S.checks[dateStr][kidId]={};
  S.checks[dateStr][kidId][choreId]=!S.checks[dateStr][kidId][choreId];
  save();
  const choreIds=S.assignments[kidId]||[];
  const checked=S.checks[dateStr][kidId];
  const allDone=choreIds.length>0&&choreIds.every(c=>checked[c]);
  const ck=`day_${dateStr}_${kidId}`;
  if(allDone&&!S.shownCelebration[ck]){
    S.shownCelebration[ck]=true;save();
    const kid=S.kids.find(k=>k.id===kidId);
    setTimeout(()=>showCelebration(kid.name,false),300);
  }
  renderToday();
}

// ── WALLET ────────────────────────────────────────────────────────────────
function ensureWallet(id){if(!S.wallets[id])S.wallets[id]={balance:0,transactions:[]};}
function addTransaction(kidId,amount,note,type){
  ensureWallet(kidId);
  const w=S.wallets[kidId];
  w.balance=Math.max(0,parseFloat((w.balance+amount).toFixed(2)));
  w.transactions.unshift({id:Date.now(),date:todayStr(),amount,note,type});
  save();
}

let pendingTx=null;
function openModal(kidId,type){
  pendingTx={kidId,type};
  const kid=S.kids.find(k=>k.id===kidId);
  document.getElementById('tx-modal-title').textContent=type==='earn'?'💵 Add Earnings':'🛍 Log Spending';
  document.getElementById('tx-modal-sub').textContent=`${kid.name}'s wallet`;
  document.getElementById('tx-amount').value='';
  document.getElementById('tx-note').value='';
  const btn=document.getElementById('tx-confirm-btn');
  btn.style.background=type==='earn'?'#16a34a':'#dc2626';
  btn.textContent=type==='earn'?'+ Add Money':'− Spend';
  document.getElementById('tx-modal').classList.add('show');
  setTimeout(()=>document.getElementById('tx-amount').focus(),120);
}
function closeModal(){document.getElementById('tx-modal').classList.remove('show');pendingTx=null;}
function confirmTransaction(){
  if(!pendingTx)return;
  const raw=parseFloat(document.getElementById('tx-amount').value.replace(/[^0-9.]/g,''));
  const amtInput=document.getElementById('tx-amount');
  if(isNaN(raw)||raw<=0){amtInput.style.borderColor='var(--coral)';return;}
  amtInput.style.borderColor='#d0dce8';
  const note=document.getElementById('tx-note').value.trim()||(pendingTx.type==='earn'?'Earnings':'Purchase');
  const amount=pendingTx.type==='earn'?raw:-raw;
  addTransaction(pendingTx.kidId,amount,note,pendingTx.type);
  closeModal();renderWallets();renderToday();
}

function renderWallets(){
  const grid=document.getElementById('wallet-grid');
  const empty=document.getElementById('wallet-empty');
  grid.innerHTML='';
  if(!S.kids.length){empty.style.display='block';grid.style.display='none';return;}
  empty.style.display='none';grid.style.display='grid';
  S.kids.forEach(kid=>{
    ensureWallet(kid.id);
    const w=S.wallets[kid.id];
    const col=KID_COLORS[kid.colorIdx%KID_COLORS.length];
    const txHTML=w.transactions.length
      ?w.transactions.slice(0,20).map(tx=>`
        <div class="wallet-tx">
          <span class="wallet-tx-label">${tx.note}</span>
          <span class="wallet-tx-date">${fmtDate(tx.date)}</span>
          <span class="wallet-tx-amount ${tx.amount>0?'pos':'neg'}">${tx.amount>0?'+':''}\$${Math.abs(tx.amount).toFixed(2)}</span>
        </div>`).join('')
      :`<div class="wallet-tx-empty">No transactions yet</div>`;
    const card=document.createElement('div');
    card.className='wallet-card';
    card.innerHTML=`
      <div class="wallet-card-header">
        <div class="wallet-avatar" style="background:${col.bg};color:${col.text}">${kid.name[0].toUpperCase()}</div>
        <div>
          <div class="wallet-kid-name">${kid.name}</div>
          <div class="wallet-balance">$${w.balance.toFixed(2)}</div>
          <div class="wallet-balance-label">current balance</div>
        </div>
      </div>
      <div class="wallet-actions">
        <button class="wallet-btn earn" onclick="openModal('${kid.id}','earn')">+ Earn</button>
        <button class="wallet-btn spend" onclick="openModal('${kid.id}','spend')">− Spend</button>
      </div>
      <div class="wallet-history">${txHTML}</div>`;
    grid.appendChild(card);
  });
}

// ── WEEKLY + BONUS ────────────────────────────────────────────────────────
function checkWeeklyBonus(){
  const week=weekDates(),weekKey=week[0];
  S.kids.forEach(kid=>{
    const choreIds=S.assignments[kid.id]||[];
    if(!choreIds.length)return;
    const ck=`week_${weekKey}_${kid.id}`;
    if(S.shownCelebration[ck])return;
    const now=new Date();
    const daysPassed=week.filter(ds=>{const d=new Date(ds+'T23:59:59');return d<=now;}).length;
    if(daysPassed<7)return;
    const allPerfect=week.every(ds=>{
      const checked=(S.checks[ds]&&S.checks[ds][kid.id])||{};
      return choreIds.every(cid=>checked[cid]);
    });
    if(allPerfect){
      S.shownCelebration[ck]=true;save();
      addTransaction(kid.id,WEEKLY_BONUS,'⭐ Perfect week bonus!','earn');
      const kidObj=S.kids.find(k=>k.id===kid.id);
      setTimeout(()=>showCelebration(kidObj.name,true),400);
    }
  });
}

function renderWeekly(){checkWeeklyBonus();renderRecap();renderKidsManage();renderChoresManage();updateAssignSelects();}

function renderRecap(){
  const container=document.getElementById('recap-container');
  container.innerHTML='';
  const week=weekDates();
  if(!S.kids.length){container.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><span class="emoji">📋</span>Add kids below to see their recap.</div>`;return;}
  S.kids.forEach(kid=>{
    const col=KID_COLORS[kid.colorIdx%KID_COLORS.length];
    const choreIds=S.assignments[kid.id]||[];
    let totalChecked=0,totalPossible=0,perfectDays=0;
    const weekKey=week[0];
    const bonusEarned=!!S.shownCelebration[`week_${weekKey}_${kid.id}`];
    const now=new Date();
    const dayDots=week.map(ds=>{
      const checked=(S.checks[ds]&&S.checks[ds][kid.id])||{};
      const done=choreIds.filter(c=>checked[c]).length;
      const possible=choreIds.length;
      const d=new Date(ds+'T12:00:00');
      const isFuture=d>now;
      totalChecked+=done;totalPossible+=possible;
      if(possible>0&&done===possible&&!isFuture)perfectDays++;
      const label=DAYS[d.getDay()].slice(0,1);
      const cls=isFuture?'':(possible>0?(done===possible?'perfect':done>0?'partial':''):'');
      return `<div class="recap-day-dot ${cls}">${label}</div>`;
    }).join('');
    const pct=totalPossible>0?Math.round((totalChecked/totalPossible)*100):0;
    const pctColor=pct>=80?'var(--green)':pct>=50?'var(--gold-dark)':'var(--coral)';
    const emoji=pct>=90?'🌟':pct>=70?'😊':pct>=40?'💪':'🌱';
    const bonusTxt=bonusEarned
      ?`<div class="recap-bonus" style="color:#16a34a">🏆 $${WEEKLY_BONUS.toFixed(2)} bonus earned!</div>`
      :`<div class="recap-bonus" style="color:var(--muted)">🎯 Perfect week = $${WEEKLY_BONUS.toFixed(2)}</div>`;
    const card=document.createElement('div');
    card.className='recap-card';
    card.innerHTML=`
      <div class="recap-avatar" style="background:${col.bg};color:${col.text}">${kid.name[0].toUpperCase()}</div>
      <div class="recap-kid-name">${kid.name}</div>
      <div class="recap-score">${totalChecked} <span>/ ${totalPossible}</span></div>
      <div class="recap-pct" style="color:${pctColor}">${emoji} ${pct}% complete</div>
      <div class="recap-streak">⚡ ${perfectDays} perfect day${perfectDays!==1?'s':''} this week</div>
      ${bonusTxt}
      <div class="recap-days">${dayDots}</div>`;
    container.appendChild(card);
  });
}

// ── MANAGE ────────────────────────────────────────────────────────────────
function renderKidsManage(){
  const list=document.getElementById('kids-manage-list');list.innerHTML='';
  if(!S.kids.length){list.innerHTML=`<div style="color:var(--muted);font-size:0.86rem;font-weight:600;padding:5px 0">No kids yet.</div>`;return;}
  S.kids.forEach(kid=>{
    const col=KID_COLORS[kid.colorIdx%KID_COLORS.length];
    const row=document.createElement('div');row.className='kid-manage-row';
    row.innerHTML=`<div class="kid-color-dot" style="background:${col.dot}"></div><div class="kid-manage-name">${kid.name}</div><button class="btn-icon danger" onclick="removeKid('${kid.id}')">🗑</button>`;
    list.appendChild(row);
  });
}
function renderChoresManage(){
  const list=document.getElementById('chores-manage-list');list.innerHTML='';
  if(!S.chores.length){list.innerHTML=`<div style="color:var(--muted);font-size:0.86rem;font-weight:600;padding:5px 0">No chores yet.</div>`;return;}
  S.chores.forEach(chore=>{
    const row=document.createElement('div');row.className='chore-manage-row';
    row.innerHTML=`<span>${chore.emoji||'✅'}</span><span class="chore-manage-name">${chore.name}</span><button class="btn-icon danger" onclick="removeChore('${chore.id}')">🗑</button>`;
    list.appendChild(row);
  });
}
function updateAssignSelects(){
  const cs=document.getElementById('assign-chore-select-chore');
  const ks=document.getElementById('assign-chore-select-kid');
  cs.innerHTML=S.chores.map(c=>`<option value="${c.id}">${c.emoji||'✅'} ${c.name}</option>`).join('')||'<option disabled>No chores</option>';
  ks.innerHTML=S.kids.map(k=>`<option value="${k.id}">${k.name}</option>`).join('')||'<option disabled>No kids</option>';
}
function addKid(){
  const input=document.getElementById('new-kid-name');
  const name=input.value.trim();if(!name)return;
  const id='kid_'+Date.now();
  S.kids.push({id,name,colorIdx:S.kids.length%KID_COLORS.length});
  S.assignments[id]=[];ensureWallet(id);input.value='';save();
  renderWeekly();renderToday();
}
function removeKid(id){
  if(!confirm('Remove this kid and all their data?'))return;
  S.kids=S.kids.filter(k=>k.id!==id);
  delete S.assignments[id];delete S.wallets[id];save();
  renderWeekly();renderToday();renderWallets();
}
function addChore(){
  const ni=document.getElementById('new-chore-name');
  const ei=document.getElementById('new-chore-emoji');
  const name=ni.value.trim();if(!name)return;
  S.chores.push({id:'chore_'+Date.now(),name,emoji:ei.value.trim()||'✅'});
  ni.value='';ei.value='';save();renderWeekly();renderToday();
}
function removeChore(id){
  S.chores=S.chores.filter(c=>c.id!==id);
  Object.keys(S.assignments).forEach(kid=>{S.assignments[kid]=S.assignments[kid].filter(c=>c!==id);});
  save();renderWeekly();renderToday();
}
function assignChore(){
  const cid=document.getElementById('assign-chore-select-chore').value;
  const kid=document.getElementById('assign-chore-select-kid').value;
  if(!cid||!kid)return;
  if(!S.assignments[kid])S.assignments[kid]=[];
  if(!S.assignments[kid].includes(cid)){S.assignments[kid].push(cid);save();renderToday();renderRecap();}
}
function unassignChore(){
  const cid=document.getElementById('assign-chore-select-chore').value;
  const kid=document.getElementById('assign-chore-select-kid').value;
  if(!cid||!kid)return;
  S.assignments[kid]=(S.assignments[kid]||[]).filter(id=>id!==cid);
  save();renderToday();renderRecap();
}
function clearAllData(){
  if(!confirm('Permanently delete all data?'))return;
  localStorage.removeItem('chore-v2');
  S={kids:[],chores:[],assignments:{},checks:{},lastDate:null,shownCelebration:{},wallets:{}};
  renderToday();renderWeekly();renderWallets();
}

// ── CELEBRATION ───────────────────────────────────────────────────────────
function showCelebration(name,isWeekly){
  document.getElementById('celebration-name').textContent=isWeekly?`${name} had a perfect week! 🌟`:`${name} finished all chores!`;
  const bon=document.getElementById('celebration-bonus');
  if(isWeekly){bon.textContent=`💵 $${WEEKLY_BONUS.toFixed(2)} added to wallet!`;bon.style.display='block';}
  else bon.style.display='none';
  document.getElementById('celebration-overlay').classList.add('show');
  launchConfetti();
}
function dismissCelebration(){
  document.getElementById('celebration-overlay').classList.remove('show');
  document.querySelectorAll('.confetti-piece').forEach(el=>el.remove());
  renderWallets();renderToday();
}
function launchConfetti(){
  const colors=['#f5c842','#4ecdc4','#ff6b6b','#a78bfa','#22c55e','#fb923c','#f472b6'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

document.getElementById('new-kid-name').addEventListener('keydown',e=>{if(e.key==='Enter')addKid();});
document.getElementById('new-chore-name').addEventListener('keydown',e=>{if(e.key==='Enter')addChore();});
document.getElementById('tx-modal').addEventListener('click',e=>{if(e.target===document.getElementById('tx-modal'))closeModal();});

load();renderToday();
</script>
</body>
